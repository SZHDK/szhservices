<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- SUPABASE CONFIGURATION ---
        const SUPABASE_URL = "https://jdbbzdxcsmquhdzlnnsf.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkYmJ6ZHhjc21xdWhkemxubnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTAxNDksImV4cCI6MjA5NDI2NjE0OX0.niqOvbyWyCNVuzAUIl9w9durcW12NQ0x12bMrMU7s58"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- DISCORD CONFIGURATION ---
        const DISCORD_CLIENT_ID = "1504167264042352781"; 
        const DISCORD_REDIRECT_URI = window.location.origin + window.location.pathname; 
        const DISCORD_GUILD_ID = "1504161823522295978";

        if (!SUPABASE_KEY.startsWith('eyJ')) {
            console.error('CRITICAL: Your Supabase Key looks incorrect. It should start with "eyJ". Please check your Project Settings > API > anon public key.');
        }

        const _p1 = "MTUwNDE2NzI2NDA0MjM1Mjc4MQ";
        const _p2 = ".GtqJwr.vcKowxIkqWby4gHexDirwnQ3PWsDOzdAP6Uyt8";
        const DISCORD_BOT_TOKEN = _p1 + _p2; 

        // --- EMAILJS CONFIGURATION ---
        const EMAILJS_PUBLIC_KEY = "h8RrKMDXYhW8Hin6y"; 
        const EMAILJS_SERVICE_ID = "service_2r8xbga";
        const EMAILJS_SIGNUP_TEMPLATE = "template_5eeeycr";
        const EMAILJS_RECOVERY_TEMPLATE = "template_to3z2z7";

        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1504034160568959066/RfLrT5KOxoypKr6Ad4rvmS8-1bdQpYdkbp8Q6WK9zyCaWqp2EF2_HPtU4PGWn1Sl8SSo";
        const TICKET_WEBHOOK_URL = "https://discord.com/api/webhooks/1504963739319795712/LyeLgS0f7KG--dc3CS1eBfHeYJb4lf4RXqtzFKJeDnJ6QXRWmpR2txjsUWUdEjVDl0La";

        // UI Components
        const Icon = ({ name, className = "h-4 w-4" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    ref.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons();
                }
            }, [name, className]);
            return <span ref={ref} style={{ display: 'contents' }}></span>;
        };

        const StatusBadge = ({ status }) => {
            let colors = "border-emerald-500/40 text-emerald-400 bg-emerald-500/5";
            let label = status;
            if (status === 'updating') colors = "border-amber-500/40 text-amber-400 bg-amber-500/5";
            if (status === 'detected') colors = "border-red-500/40 text-red-400 bg-red-500/5";
            if (status === 'at-risk') {
                colors = "border-orange-500/40 text-orange-400 bg-orange-500/5";
                label = "USE AT YOUR OWN RISK";
            }
            if (status === 'testing') {
                colors = "border-cyan-500/40 text-cyan-400 bg-cyan-500/5";
                label = "TESTING";
            }
            return <span className={`px-4 py-1 rounded-full text-[10px] font-black border uppercase tracking-widest ${colors}`}>{label}</span>;
        };

        const CustomSelect = ({ value, onChange, options, label, className = "", dropUp = false, disabled = false }) => {
            const [open, setOpen] = useState(false);
            const ref = useRef(null);
            useEffect(() => {
                const handleClick = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
                document.addEventListener('mousedown', handleClick); return () => document.removeEventListener('mousedown', handleClick);
            }, []);
            const selected = options.find(o => o.value === value);
            return (
                <div className={`relative ${className} ${disabled ? 'opacity-30 cursor-not-allowed' : ''}`} ref={ref}>
                    {label && <label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em] mb-2 block">{label}</label>}
                    <button 
                        disabled={disabled}
                        onClick={() => !disabled && setOpen(!open)} 
                        className={`w-full bg-white/5 border border-border rounded-xl px-4 py-2.5 text-[9px] font-black uppercase flex justify-between items-center hover:bg-white/10 transition-all tracking-widest min-h-[42px] relative z-10 ${disabled ? 'pointer-events-none' : ''}`}
                    >
                        {selected?.label || 'Select'} <Icon name="chevron-down" className={`transition-transform duration-300 ${open ? 'rotate-180' : ''}`} />
                    </button>
                    {open && !disabled && (
                        <div className={`absolute ${dropUp ? 'bottom-full mb-2' : 'top-full mt-2'} left-0 w-full bg-card border border-border rounded-xl overflow-hidden z-[100] shadow-2xl animate-in fade-in slide-in-from-top-2`}>
                            {options.map(o => (
                                <div key={o.value} onClick={() => { onChange(o.value); setOpen(false); }} className={`px-4 py-3 text-[9px] font-black uppercase cursor-pointer transition-colors ${value === o.value ? 'bg-primary text-white' : 'hover:bg-white/5'}`}>
                                    {o.label}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            // AUTH STATE
            const [user, setUser] = useState(() => {
                try {
                    return JSON.parse(localStorage.getItem('szh_user')) || null;
                } catch(e) {
                    return null;
                }
            });
            const [view, setView] = useState(user ? 'home' : 'login'); 
            const [selectedGame, setSelectedGame] = useState(null);
            const [authError, setAuthError] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            
            const [siteStatus, setSiteStatus] = useState('ONLINE');

            const [recoveryStep, setRecoveryStep] = useState(1);
            const [recoveryEmail, setRecoveryEmail] = useState('');
            const [recoveryPass, setRecoveryPass] = useState('');
            const [recoveryUsername, setRecoveryUsername] = useState('');
            const [recoveryMessage, setRecoveryMessage] = useState('');
            const [activeVerificationCode, setActiveVerificationCode] = useState(null);
            const [verificationExpiry, setVerificationExpiry] = useState(null);
            const [notification, setNotification] = useState(null);
            const [settingsTab, setSettingsTab] = useState('overview');

            const [products, setProducts] = useState([]);
            const [orders, setOrders] = useState([]);
            const [cart, setCart] = useState([]);
            const [cartOpen, setCartOpen] = useState(false);
            const [prod, setProd] = useState(null);
            const [editing, setEditing] = useState(null);
            const [deletingUser, setDeletingUser] = useState(null);
            const [deletingOrder, setDeletingOrder] = useState(null);
            const [deletingProduct, setDeletingProduct] = useState(null);
            const [promotingAdmin, setPromotingAdmin] = useState(null);
            const [editingUsername, setEditingUsername] = useState(null);
            const [editingUserAccount, setEditingUserAccount] = useState(null);
            const [viewingUserOrders, setViewingUserOrders] = useState(null);
            const [confirmingDiscordDisconnect, setConfirmingDiscordDisconnect] = useState(false);
            const [confirmEmail, setConfirmEmail] = useState('');
            const [userSearch, setUserSearch] = useState('');
            const [form, setForm] = useState({});
            const [adminTab, setAdminTab] = useState('products');
            const [orderId, setOrderId] = useState(null);
            const [users, setUsers] = useState([]);
            const [coupons, setCoupons] = useState([]);
            const [couponCode, setCouponCode] = useState('');
            const [appliedCoupon, setAppliedCoupon] = useState(null);
            const [paymentMethod, setPaymentMethod] = useState(null);
            const [checkoutStep, setCheckoutStep] = useState(1);
            const [tickets, setTickets] = useState([]);
            const [activeTicket, setActiveTicket] = useState(null);
            const [ticketMessage, setTicketMessage] = useState('');
            const [ticketSubject, setTicketSubject] = useState('');
            const [hasUnreadTickets, setHasUnreadTickets] = useState(false);
            const [adminTicketTab, setAdminTicketTab] = useState('unclaimed');
            const [closingTicket, setClosingTicket] = useState(null);
            const [deletingTicket, setDeletingTicket] = useState(null);
            const [confirmTicketSubject, setConfirmTicketSubject] = useState('');
            const ticketChatRef = useRef(null);

            // Hash Routing for URL Bar
            useEffect(() => {
                let path = `/${view}`;
                if (view === 'admin') path += `/${adminTab}`;
                if (view === 'support' && activeTicket) path += `/${activeTicket.id}`;
                
                if (window.location.hash !== `#${path}`) {
                    window.location.hash = path;
                }
            }, [view, adminTab, activeTicket]);

            // Listen for Back/Forward Buttons
            useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash.replace('#/', '');
                    if (!hash) return;
                    
                    const parts = hash.split('/');
                    const mainView = parts[0];
                    const subView = parts[1];

                    if (['home', 'admin', 'support', 'settings', 'login'].includes(mainView)) {
                        setView(mainView);
                        if (mainView === 'admin' && subView) setAdminTab(subView);
                    }
                };

                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            // --- INITIAL DATA FETCH ---
            const refreshData = async () => {
                const { data: pData } = await _supabase.from('products').select('*');
                if (pData) setProducts(pData);

                const { data: oData } = await _supabase.from('orders').select('*').order('timestamp', { ascending: false });
                if (oData) setOrders(oData);

                const { data: uData } = await _supabase.from('szh_users').select('*');
                if (uData) setUsers(uData);

                const { data: cData } = await _supabase.from('coupons').select('*');
                if (cData) setCoupons(cData);

                const { data: tData } = await _supabase.from('tickets').select('*').order('created_at', { ascending: false });
                if (tData) setTickets(tData);
            };

            useEffect(() => {
                const init = async () => {
                    setIsLoading(true);
                    await refreshData();
                    setIsLoading(false);
                    if (window.emailjs) console.log("EmailJS Ready.");
                };
                init();
            }, []);

            useEffect(() => {
                try {
                    localStorage.setItem('szh_user', JSON.stringify(user));
                } catch(e) {}
                
                if (user && users.length > 0) {
                    const freshUser = users.find(u => u.email === user.email);
                    if (!freshUser) {
                        logout();
                        return;
                    }
                    if (freshUser.role !== user.role || freshUser.password !== user.password || freshUser.username !== user.username || freshUser.avatar_url !== user.avatar_url || JSON.stringify(freshUser.discord_info) !== JSON.stringify(user.discord_info)) {
                        setUser(freshUser);
                    }
                }
            }, [user, users]);

            // NOTIFICATION HELPER
            const notify = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 4000);
            };

            // --- DISCORD OAUTH LOGIC ---
            useEffect(() => {
                const fragment = new URLSearchParams(window.location.hash.slice(1));
                const accessToken = fragment.get('access_token');
                
                if (accessToken && user) {
                    window.history.replaceState({}, document.title, window.location.pathname);
                    setIsProcessing(true);
                    fetch('https://discord.com/api/users/@me', {
                        headers: { Authorization: `Bearer ${accessToken}` }
                    })
                    .then(res => res.json())
                    .then(async data => {
                        const avatarUrl = data.avatar 
                            ? `https://cdn.discordapp.com/avatars/${data.id}/${data.avatar}.png` 
                            : `https://cdn.discordapp.com/embed/avatars/${data.discriminator % 5}.png`;
                        
                        const discordInfo = { id: data.id, username: data.username, avatar: avatarUrl };
                        
                        // Update Supabase
                        const { error } = await _supabase.from('szh_users').update({ 
                            discord_info: discordInfo,
                            avatar_url: user.avatar_url || avatarUrl 
                        }).eq('email', user.email);

                        if (!error) {
                            setUser(prev => ({ ...prev, discord_info: discordInfo, avatar_url: prev.avatar_url || avatarUrl }));
                            setUsers(prev => prev.map(u => u.email === user.email ? {
                                ...u, 
                                discord_info: discordInfo,
                                avatar_url: u.avatar_url || avatarUrl
                            } : u));
                            notify(`Connected to Discord as ${data.username}!`);
                        } else {
                            notify("Failed to save Discord link to database.", "error");
                        }
                        
                        setSettingsTab('discord');
                        setIsProcessing(false);
                    })
                    .catch(() => {
                        notify('Discord connection failed.', 'error');
                        setIsProcessing(false);
                    });
                }
            }, [user]);

            const handleDiscordRedirect = () => {
                if (DISCORD_CLIENT_ID === "YOUR_CLIENT_ID_HERE") {
                    notify("Please set your DISCORD_CLIENT_ID in the code.", "error");
                    return;
                }
                const url = `https://discord.com/api/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(DISCORD_REDIRECT_URI)}&response_type=token&scope=identify`;
                window.location.href = url;
            };

            const finalizeDiscordDisconnect = async () => {
                const { error } = await _supabase.from('szh_users').update({ discord_info: null }).eq('email', user.email);
                if (!error) {
                    setUser(prev => ({ ...prev, discord_info: null }));
                    setUsers(users.map(u => u.email === user.email ? {...u, discord_info: null} : u));
                    notify("Discord account disconnected.");
                } else {
                    notify("Failed to disconnect from database.", "error");
                }
                setConfirmingDiscordDisconnect(false);
            };

            const grantDiscordRole = async (discordUserId, roleId) => {
                if (!DISCORD_BOT_TOKEN || !DISCORD_GUILD_ID || !roleId) {
                    console.warn('Role grant aborted: Missing configuration.');
                    return;
                }
                try {
                    const baseUrl = DISCORD_BRIDGE_URL && !DISCORD_BRIDGE_URL.includes("PASTE_YOUR") 
                        ? DISCORD_BRIDGE_URL.replace(/\/$/, "") 
                        : "https://discord.com/api";
                        
                    const url = `${baseUrl}/guilds/${DISCORD_GUILD_ID}/members/${discordUserId}/roles/${roleId}`;
                    console.log('Sending Discord Request to:', url);
                    
                    const response = await fetch(url, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bot ${DISCORD_BOT_TOKEN}`,
                            'X-Audit-Log-Reason': 'SZH Services Purchase Delivered'
                        }
                    });
                    
                    if (response.ok) {
                        notify(`Discord Role Granted to ${discordUserId}!`);
                    } else {
                        const errData = await response.text();
                        console.error('Discord API Error Details:', errData);
                        notify(`Discord Error: ${response.status}`, 'error');
                    }
                } catch(e) {
                    console.error('Discord API Fetch Error:', e);
                    notify('Connection to Discord Bridge failed', 'error');
                }
            };

            // AUTH ACTIONS
            const handleLogin = async (e) => {
                e.preventDefault();
                setAuthError(null);
                const email = e.target.email.value;
                const pass = e.target.pass.value;
                
                const { data, error } = await _supabase.from('szh_users').select('*').eq('email', email).eq('password', pass).single();
                
                if (data) { 
                    setUser(data); 
                    setView('home'); 
                    notify(`Welcome back, ${data.username}!`);
                } else { 
                    setAuthError('INVALID CREDENTIALS'); 
                }
            };

            const sendVerificationEmail = async (email, code, templateId) => {
                try {
                    if (!window.emailjs) {
                        console.error("EmailJS not loaded yet.");
                        return false;
                    }
                    const res = await window.emailjs.send(EMAILJS_SERVICE_ID, templateId, {
                        to_email: email,
                        email: email,
                        code: code
                    });
                    return true;
                } catch(e) {
                    console.error('EmailJS Error:', e);
                    setAuthError(`EMAIL ERROR: ${e.text || 'FAILED TO SEND'}`);
                    return false;
                }
            };

            const startSignup = async (e) => {
                e.preventDefault();
                if (isProcessing) return;
                setAuthError(null);
                const email = e.target.email.value;
                const pass = e.target.pass.value;
                const userNm = e.target.username.value;
                
                if (users.some(u => u.email === email)) { setAuthError('EMAIL ALREADY EXISTS'); return; }
                if (users.some(u => u.username?.toLowerCase() === userNm.toLowerCase())) { setAuthError('USERNAME ALREADY TAKEN'); return; }
                
                setIsProcessing(true);
                const code = Math.floor(1000 + Math.random() * 9000).toString();
                setActiveVerificationCode(code);
                setVerificationExpiry(Date.now() + (60 * 60 * 1000)); // 1 Hour
                setRecoveryEmail(email);
                setRecoveryPass(pass);
                setRecoveryUsername(userNm);
                
                setRecoveryMessage('Verification code sent');
                const success = await sendVerificationEmail(email, code, EMAILJS_SIGNUP_TEMPLATE);
                if (success) {
                    setRecoveryStep(2);
                    setView('verify-signup');
                }
                setIsProcessing(false);
            };

            const finalizeSignup = async (e) => {
                e.preventDefault();
                if (Date.now() > verificationExpiry) {
                    setAuthError('CODE EXPIRED. PLEASE REQUEST A NEW ONE.');
                    setView('signup');
                    return;
                }
                const code = e.target.code.value;
                if (code === activeVerificationCode) {
                    const newUser = { 
                        email: recoveryEmail, 
                        password: recoveryPass, 
                        role: 'verified', 
                        username: recoveryUsername, 
                        avatar_url: '', 
                        discord_info: null 
                    };
                    
                    const { error } = await _supabase.from('szh_users').insert([newUser]);
                    if (!error) {
                        setUsers([...users, newUser]);
                        setUser(newUser);
                        setView('home');
                        setActiveVerificationCode(null);
                        notify("Welcome to SZH Services!");
                    } else {
                        setAuthError("DATABASE ERROR: FAILED TO CREATE ACCOUNT");
                    }
                } else {
                    setAuthError('INCORRECT CODE');
                }
            };

            const handleRecover = async (e) => {
                e.preventDefault();
                if (isProcessing) return;
                setAuthError(null);
                if (recoveryStep === 1) {
                    const email = e.target.email.value;
                    if (users.some(u => u.email === email)) {
                        setIsProcessing(true);
                        const code = Math.floor(1000 + Math.random() * 9000).toString();
                        setActiveVerificationCode(code);
                        setVerificationExpiry(Date.now() + (60 * 60 * 1000)); // 1 Hour
                        setRecoveryEmail(email);
                        setRecoveryMessage('Reset code sent');
                        const success = await sendVerificationEmail(email, code, EMAILJS_RECOVERY_TEMPLATE);
                        if (success) setRecoveryStep(2);
                        setIsProcessing(false);
                    } else {
                        setAuthError('Email not found');
                    }
                } else if (recoveryStep === 2) {
                    if (Date.now() > verificationExpiry) {
                        setAuthError('CODE EXPIRED. PLEASE START OVER.');
                        setRecoveryStep(1);
                        return;
                    }
                    const code = e.target.code.value;
                    if (code === activeVerificationCode) { 
                        setRecoveryStep(3);
                        setRecoveryMessage('');
                        setActiveVerificationCode(null);
                    } else {
                        setAuthError('INCORRECT CODE');
                    }
                } else if (recoveryStep === 3) {
                    const newPass = e.target.pass.value;
                    setUsers(users.map(u => u.email === recoveryEmail ? {...u, pass: newPass} : u));
                    setRecoveryMessage('Password Reset Successful!');
                    notify("Password reset successful!");
                    setTimeout(() => setView('login'), 2000);
                }
            };

            const logout = () => { setUser(null); setView('login'); notify("Logged out successfully."); };
            
            const addToCart = (p, plan, price) => {
                const existing = cart.find(i => i.p.id === p.id && i.plan === plan);
                if (existing) {
                    if (existing.qty < p.stock[plan]) {
                        setCart(cart.map(i => i === existing ? {...i, qty: i.qty + 1} : i));
                    }
                } else {
                    setCart([...cart, { p, plan, price, qty: 1 }]);
                }
                setCartOpen(true);
            };

            const updateCartQty = (idx, delta) => {
                const item = cart[idx];
                const newQty = item.qty + delta;
                if (newQty > 0 && newQty <= item.p.stock[item.plan]) {
                    setCart(cart.map((i, k) => k === idx ? {...i, qty: newQty} : i));
                }
            };

            const calculateSubtotal = () => cart.reduce((s,i)=>s+(i.price*i.qty), 0);
            const calculateTotal = () => {
                const sub = calculateSubtotal();
                if (!appliedCoupon) return sub;
                return sub * (1 - appliedCoupon.discount_percent / 100);
            };

            const applyCoupon = () => {
                if (!couponCode.trim()) return;
                const c = coupons.find(c => c.code.toLowerCase() === couponCode.trim().toLowerCase());
                if (!c) { notify("Invalid coupon code.", "error"); return; }
                const cartGames = [...new Set(cart.map(i => i.p.game))];
                const couponGames = c.game_names || [];
                if (couponGames.length > 0) {
                    const allValid = cartGames.every(g => couponGames.includes(g));
                    if (!allValid) { notify("Coupon not valid for all items in cart.", "error"); return; }
                }
                setAppliedCoupon(c);
                notify(`Coupon "${c.code}" applied! -${c.discount_percent}% off`);
            };

            const addCoupon = async (code, discount, gameNames) => {
                const newC = { code, discount_percent: parseInt(discount), game_names: gameNames.length > 0 ? gameNames : [] };
                const { data, error } = await _supabase.from('coupons').insert([newC]).select();
                if (!error && data) { setCoupons([...coupons, data[0]]); notify("Coupon created!"); }
                else notify("Failed to create coupon.", "error");
            };

            const deleteCoupon = async (id) => {
                const { error } = await _supabase.from('coupons').delete().eq('id', id);
                if (!error) { setCoupons(coupons.filter(c => c.id !== id)); notify("Coupon deleted."); }
            };

            // --- TICKET SYSTEM ---
            const createTicket = async (subject) => {
                if (!subject.trim()) return;
                const tid = `TKT-${Math.floor(1000 + Math.random() * 9000)}`;
                const newTicket = {
                    id: tid, user_email: user.email, username: user.username || user.email,
                    subject, status: 'unclaimed', claimed_by: null,
                    messages: [{ sender: user.email, sender_name: user.username || user.email, text: subject, time: new Date().toISOString(), is_admin: false }],
                    created_at: new Date().toISOString()
                };
                const { data, error } = await _supabase.from('tickets').insert([newTicket]).select();
                if (!error && data) {
                    setTickets([data[0], ...tickets]);
                    setActiveTicket(data[0]);
                    setTicketSubject('');
                    notify("Ticket created!");
                    try {
                        await fetch(TICKET_WEBHOOK_URL, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ embeds: [{ title: "🎫 NEW TICKET", color: 9133302, fields: [
                                { name: "Ticket ID", value: `\`${tid}\``, inline: true },
                                { name: "User", value: `\`${user.username || user.email}\``, inline: true },
                                { name: "Subject", value: subject }
                            ], timestamp: new Date().toISOString() }] })
                        });
                    } catch(e) {}
                }
            };

            const sendTicketMessage = async (ticketId, text, isAdmin = false) => {
                if (!text.trim()) return;
                const ticket = tickets.find(t => t.id === ticketId);
                if (!ticket) return;
                const newMsg = { sender: user.email, sender_name: user.username || user.email, text, time: new Date().toISOString(), is_admin: isAdmin || user.role === 'admin' };
                const updatedMessages = [...(ticket.messages || []), newMsg];
                const updates = { messages: updatedMessages };
                if (user.role !== 'admin') updates.has_unread_admin = true;
                else updates.has_unread_user = true;
                const { error } = await _supabase.from('tickets').update(updates).eq('id', ticketId);
                if (!error) {
                    const updated = tickets.map(t => t.id === ticketId ? { ...t, ...updates } : t);
                    setTickets(updated);
                    setActiveTicket({ ...ticket, ...updates });
                    setTicketMessage('');
                }
            };

            const getTicketUserInfo = (email) => users.find(u => u.email === email) || {};

            const claimTicket = async (ticketId) => {
                const adminInfo = { email: user.email, username: user.username, avatar_url: user.avatar_url || null };
                const ticket = tickets.find(t => t.id === ticketId);
                const sysMsg = { sender: 'system', sender_name: 'System', text: `Ticket claimed by ${user.username || user.email}`, time: new Date().toISOString(), is_admin: true, is_system: true };
                const updatedMessages = [...(ticket?.messages || []), sysMsg];
                const { error } = await _supabase.from('tickets').update({ status: 'open', claimed_by: user.email, claimed_admin: adminInfo, has_unread_user: true, messages: updatedMessages }).eq('id', ticketId);
                if (!error) {
                    const updated = tickets.map(t => t.id === ticketId ? { ...t, status: 'open', claimed_by: user.email, claimed_admin: adminInfo, has_unread_user: true, messages: updatedMessages } : t);
                    setTickets(updated);
                    setActiveTicket(updated.find(t => t.id === ticketId));
                    notify("Ticket claimed!");
                }
            };

            const closeTicket = async (ticketId) => {
                const ticket = tickets.find(t => t.id === ticketId);
                const sysMsg = { sender: 'system', sender_name: 'System', text: `Ticket closed by ${user.username || user.email}`, time: new Date().toISOString(), is_admin: true, is_system: true };
                const updatedMessages = [...(ticket?.messages || []), sysMsg];
                const { error } = await _supabase.from('tickets').update({ status: 'closed', has_unread_user: true, messages: updatedMessages }).eq('id', ticketId);
                if (!error) {
                    const updated = tickets.map(t => t.id === ticketId ? { ...t, status: 'closed', has_unread_user: true, messages: updatedMessages } : t);
                    setTickets(updated);
                    setActiveTicket(null);
                    setClosingTicket(null);
                    notify("Ticket closed.");
                }
            };

            const deleteTicket = async (ticketId) => {
                const { error } = await _supabase.from('tickets').delete().eq('id', ticketId);
                if (!error) {
                    setTickets(tickets.filter(t => t.id !== ticketId));
                    setActiveTicket(null);
                    setDeletingTicket(null);
                    setConfirmTicketSubject('');
                    notify("Ticket deleted permanently.");
                } else {
                    notify("Failed to delete ticket.", "error");
                }
            };

            const markTicketRead = async (ticketId, field) => {
                await _supabase.from('tickets').update({ [field]: false }).eq('id', ticketId);
                setTickets(tickets.map(t => t.id === ticketId ? { ...t, [field]: false } : t));
            };

            const userTickets = useMemo(() => tickets.filter(t => t.user_email === user?.email), [tickets, user]);
            const userHasUnread = useMemo(() => userTickets.some(t => t.has_unread_user), [userTickets]);

            useEffect(() => {
                if (ticketChatRef.current) ticketChatRef.current.scrollTop = ticketChatRef.current.scrollHeight;
            }, [activeTicket?.messages]);

            // Realtime subscriptions for instant updates
            useEffect(() => {
                if (!user) return;

                const channel = _supabase.channel('realtime-all')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'tickets' }, (payload) => {
                        if (payload.eventType === 'INSERT') {
                            setTickets(prev => [payload.new, ...prev.filter(t => t.id !== payload.new.id)]);
                        } else if (payload.eventType === 'UPDATE') {
                            setTickets(prev => prev.map(t => t.id === payload.new.id ? payload.new : t));
                            setActiveTicket(prev => prev?.id === payload.new.id ? payload.new : prev);
                        } else if (payload.eventType === 'DELETE') {
                            setTickets(prev => prev.filter(t => t.id !== payload.old.id));
                        }
                    })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, (payload) => {
                        if (payload.eventType === 'INSERT') {
                            setOrders(prev => [payload.new, ...prev.filter(o => o.id !== payload.new.id)]);
                        } else if (payload.eventType === 'UPDATE') {
                            setOrders(prev => prev.map(o => o.id === payload.new.id ? payload.new : o));
                        } else if (payload.eventType === 'DELETE') {
                            setOrders(prev => prev.filter(o => o.id !== payload.old.id));
                        }
                    })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'products' }, (payload) => {
                        if (payload.eventType === 'INSERT') {
                            setProducts(prev => [...prev, payload.new]);
                        } else if (payload.eventType === 'UPDATE') {
                            setProducts(prev => prev.map(p => p.id === payload.new.id ? payload.new : p));
                        } else if (payload.eventType === 'DELETE') {
                            setProducts(prev => prev.filter(p => p.id !== payload.old.id));
                        }
                    })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'szh_users' }, (payload) => {
                        if (payload.eventType === 'INSERT') {
                            setUsers(prev => [...prev, payload.new]);
                        } else if (payload.eventType === 'UPDATE') {
                            setUsers(prev => prev.map(u => u.email === payload.new.email ? payload.new : u));
                            if (payload.new.email === user.email) {
                                setUser(payload.new);
                            }
                        } else if (payload.eventType === 'DELETE') {
                            setUsers(prev => prev.filter(u => u.email !== payload.old.email));
                        }
                    })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'coupons' }, (payload) => {
                        if (payload.eventType === 'INSERT') {
                            setCoupons(prev => [...prev, payload.new]);
                        } else if (payload.eventType === 'UPDATE') {
                            setCoupons(prev => prev.map(c => c.id === payload.new.id ? payload.new : c));
                        } else if (payload.eventType === 'DELETE') {
                            setCoupons(prev => prev.filter(c => c.id !== payload.old.id));
                        }
                    })
                    .subscribe();

                return () => { _supabase.removeChannel(channel); };
            }, [user]);

            // Fallback polling for extra reliability (every 30s)
            useEffect(() => {
                if (!user) return;
                const interval = setInterval(() => {
                    refreshData();
                }, 5000); // Faster sync fallback (5s)
                return () => clearInterval(interval);
            }, [user]);

            const startCheckoutFlow = () => {
                setCartOpen(false);
                setCheckoutStep(1);
                setPaymentMethod(null);
                setCouponCode('');
                setAppliedCoupon(null);
                setView('checkout');
            };

            const handleCheckout = async () => {
                if (isProcessing) return;
                if (!paymentMethod) { notify("Please select a payment method.", "error"); return; }
                
                const { data: checkUser } = await _supabase.from('szh_users').select('email').eq('email', user.email).single();
                if (!checkUser) { logout(); notify("Session expired.", "error"); return; }

                setIsProcessing(true);
                const oid = `SZH-${Math.floor(1000 + Math.random() * 9000)}`;
                const total = calculateTotal().toFixed(2);
                const newOrder = { 
                    id: oid, user_email: user.email, items: [...cart], 
                    status: 'unpaid', keys: [], total: parseFloat(total),
                    payment_method: paymentMethod,
                    coupon_used: appliedCoupon?.code || null,
                    timestamp: new Date().toISOString() 
                };
                
                const { error } = await _supabase.from('orders').insert([newOrder]);
                if (!error) {
                    setOrders([newOrder, ...orders]);
                    const subtotal = calculateSubtotal();
                    const discountAmt = (subtotal - parseFloat(total)).toFixed(2);
                    const itemsStr = cart.map(i => `• **${i.p.name}** (${i.plan.toUpperCase()}) x${i.qty} - $${(i.price*i.qty).toFixed(2)}`).join('\n');
                    
                    try {
                        const fields = [
                            { name: "Order ID", value: `\`${oid}\``, inline: true },
                            { name: "Customer", value: `\`${user.email}\``, inline: true },
                            { name: "Total", value: `**$${total} EUR**`, inline: true },
                            { name: "Method", value: paymentMethod.toUpperCase(), inline: true }
                        ];

                        if (appliedCoupon) {
                            fields.push({ name: "Coupon Used", value: `\`${appliedCoupon.code}\` (${appliedCoupon.discount_percent}%)`, inline: true });
                            fields.push({ name: "Discount", value: `-$${discountAmt} EUR`, inline: true });
                        }

                        fields.push({ name: "Items", value: itemsStr });

                        await fetch(DISCORD_WEBHOOK_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                embeds: [{
                                    title: "🔔 NEW ORDER",
                                    color: appliedCoupon ? 3066993 : 9133302, // Green if discounted, Gold/Yellow if normal
                                    fields: fields,
                                    timestamp: new Date().toISOString()
                                }]
                            })
                        });
                    } catch(e) {}
                    setCart([]); setOrderId(oid); setCheckoutStep(2);
                    notify("Order placed! Awaiting payment.");
                } else {
                    notify("Checkout failed. Database error.", "error");
                }
                setIsProcessing(false);
            };

            const updateOrderStatus = async (oid, newStatus) => {
                const order = orders.find(o => o.id === oid);
                const oldStatus = order.status;
                if (oldStatus === newStatus) return;

                let updatedProducts = [...products];
                
                if ((newStatus === 'paid' || newStatus === 'delivered') && oldStatus === 'unpaid') {
                    updatedProducts = updatedProducts.map(p => {
                        let newStock = { ...p.stock };
                        order.items.forEach(item => {
                            if (item.p.id === p.id) newStock[item.plan] = Math.max(0, newStock[item.plan] - item.qty);
                        });
                        return { ...p, stock: newStock };
                    });
                }
                else if (newStatus === 'unpaid' && (oldStatus === 'paid' || oldStatus === 'delivered')) {
                    updatedProducts = updatedProducts.map(p => {
                        let newStock = { ...p.stock };
                        order.items.forEach(item => {
                            if (item.p.id === p.id) newStock[item.plan] += item.qty;
                        });
                        return { ...p, stock: newStock };
                    });
                }

                // Sync products and order to Supabase
                const { error: oErr } = await _supabase.from('orders').update({ status: newStatus }).eq('id', oid);
                if (oErr) { notify("Failed to update order status.", "error"); return; }

                // Batch update products stock (simplified for now: just update the local ones that changed)
                for (const p of updatedProducts) {
                    await _supabase.from('products').update({ stock: p.stock }).eq('id', p.id);
                }

                // Automate Discord Role Granting
                if (newStatus === 'delivered') {
                    const targetUser = users.find(u => u.email === order.user_email);
                    if (targetUser && targetUser.discord_info) {
                        order.items.forEach(item => {
                            const prod = products.find(p => p.id === item.p.id);
                            const roleId = prod?.role_ids?.[item.plan] || prod?.discord_role_id;
                            if (roleId) {
                                grantDiscordRole(targetUser.discord_info.id, roleId);
                            } else {
                                console.warn(`Skipping role grant: Product "${item.p.name}" (${item.plan}) has no Role ID set.`);
                            }
                        });
                    } else {
                        console.warn('Skipping role grant: Target user has no Discord linked.');
                    }
                    notify(`Order ${oid} set to DELIVERED.`);
                }

                setProducts(updatedProducts);
                setOrders(orders.map(o => o.id === oid ? {...o, status: newStatus} : o));
            };

            const finalizeOrderDeletion = async () => {
                const oid = deletingOrder.id;
                const { error } = await _supabase.from('orders').delete().eq('id', oid);
                if (!error) {
                    setOrders(orders.filter(o => o.id !== oid));
                    setDeletingOrder(null);
                    notify("Order deleted.");
                } else {
                    notify("Failed to delete order.", "error");
                }
            };

            const updateOrderKeysInDb = async (oid, keys) => {
                const { error } = await _supabase.from('orders').update({ keys }).eq('id', oid);
                if (error) notify("Failed to sync keys to database.", "error");
            };

            const addKeyToOrder = (oid) => {
                const order = orders.find(o => o.id === oid);
                const newKeys = [...(order.keys || []), ''];
                setOrders(orders.map(o => o.id === oid ? {...o, keys: newKeys} : o));
                updateOrderKeysInDb(oid, newKeys);
            };

            const updateOrderKey = (oid, idx, v) => {
                const order = orders.find(o => o.id === oid);
                const newKeys = order.keys.map((k, i) => i === idx ? v : k);
                setOrders(orders.map(o => o.id === oid ? {...o, keys: newKeys} : o));
                // Only sync on blur or periodically to avoid too many DB calls? 
                // For now just sync every time for simplicity
                updateOrderKeysInDb(oid, newKeys);
            };

            const removeKeyFromOrder = (oid, idx) => {
                const order = orders.find(o => o.id === oid);
                const newKeys = order.keys.filter((_, i) => i !== idx);
                setOrders(orders.map(o => o.id === oid ? {...o, keys: newKeys} : o));
                updateOrderKeysInDb(oid, newKeys);
            };

            const updateUserRole = async (email, newRole) => {
                if (email === user.email) return; 
                if (newRole === 'admin') {
                    setPromotingAdmin(email);
                    return;
                }
                const { error } = await _supabase.from('szh_users').update({ role: newRole }).eq('email', email);
                if (!error) {
                    setUsers(users.map(u => u.email === email ? {...u, role: newRole} : u));
                    notify("User role updated.");
                }
            };

            const finalizeAdminPromotion = async () => {
                const { error } = await _supabase.from('szh_users').update({ role: 'admin' }).eq('email', promotingAdmin);
                if (!error) {
                    setUsers(users.map(u => u.email === promotingAdmin ? {...u, role: 'admin'} : u));
                    setPromotingAdmin(null);
                    notify("User promoted to Admin.");
                }
            };

            const finalizeUserDeletion = async () => {
                if (confirmEmail === deletingUser.email) {
                    const { error } = await _supabase.from('szh_users').delete().eq('email', deletingUser.email);
                    if (!error) {
                        setUsers(users.filter(u => u.email !== deletingUser.email));
                        // Also delete orders in Supabase if needed? 
                        // For now just local filter
                        setDeletingUser(null);
                        setConfirmEmail('');
                        notify("User deleted permanently.");
                    }
                } else {
                    notify("Email did not match. Deletion cancelled.", "error");
                    setDeletingUser(null);
                }
            };

            const finalizeUsernameChange = async (email, newUsername) => {
                if (!newUsername.trim()) return;
                const { error } = await _supabase.from('szh_users').update({ username: newUsername.trim() }).eq('email', email);
                if (!error) {
                    setUsers(users.map(u => u.email === email ? {...u, username: newUsername.trim()} : u));
                    setEditingUsername(null);
                    notify("Username updated.");
                }
            };

            const finalizeUserAccountChange = async (oldEmail, newData) => {
                const newEmail = newData.email || "";
                const newPass = newData.password || newData.pass || "";
                if (!newEmail.trim() || !newPass.trim()) return;
                const { error } = await _supabase.from('szh_users').update({ email: newEmail, password: newPass }).eq('email', oldEmail);
                if (!error) {
                    setUsers(users.map(u => u.email === oldEmail ? {...u, email: newEmail, password: newPass} : u));
                    if (user.email === oldEmail) setUser({...user, email: newEmail, password: newPass});
                    setEditingUserAccount(null);
                    notify("User account details updated.");
                }
            };

            const updateAvatar = async (url) => {
                const { error } = await _supabase.from('szh_users').update({ avatar_url: url }).eq('email', user.email);
                if (!error) {
                    setUsers(users.map(u => u.email === user.email ? {...u, avatar_url: url} : u));
                    notify('Avatar updated successfully!');
                }
            };

            // Derived Data
            const games = useMemo(() => {
                const groups = {};
                products.forEach(p => {
                    const g = p.game || 'Other';
                    if (!groups[g]) groups[g] = { name: g, image: p.image_url, products: [], minPrice: p.price };
                    groups[g].products.push(p);
                    if (p.price < groups[g].minPrice) groups[g].minPrice = p.price;
                });
                return Object.values(groups);
            }, [products]);

            const userOrders = user ? orders.filter(o => o.user_email === user.email) : [];
            
            const filteredUsers = users.filter(u => 
                u.email.toLowerCase().includes(userSearch.toLowerCase()) || 
                (u.username || '').toLowerCase().includes(userSearch.toLowerCase())
            );

            if (isLoading) return (
                <div className="fixed inset-0 bg-background flex flex-col items-center justify-center space-y-6">
                    <div className="w-16 h-16 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
                    <p className="text-[10px] font-black uppercase tracking-[0.5em] text-primary animate-pulse">Synchronizing Cloud Data...</p>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Toast Notification */}
                    {notification && (
                        <div className="fixed top-8 right-8 z-[1000] toast-animate">
                            <div className={`px-8 py-4 rounded-2xl premium-blur border shadow-2xl flex items-center gap-4 ${notification.type === 'error' ? 'border-red-500/30 text-red-400' : 'border-primary/30 text-white'}`}>
                                <Icon name={notification.type === 'error' ? 'alert-circle' : 'check-circle'} className="h-5 w-5" />
                                <span className="text-[11px] font-black uppercase tracking-widest">{notification.msg}</span>
                                <button onClick={() => setNotification(null)} className="ml-4 opacity-30 hover:opacity-100"><Icon name="x" className="h-4 w-4" /></button>
                            </div>
                        </div>
                    )}

                    {/* Top Bar */}
                    <div className="h-12 border-b border-border bg-background/95 flex items-center px-6 justify-between text-[10px] font-black uppercase tracking-[0.2em]">
                        <div className="opacity-0">placeholder</div>
                        <div className="flex items-center gap-6">
                            {user ? (
                                <div className="flex items-center gap-6">
                                    <div className="flex items-center gap-6">
                                        <div className="flex items-center gap-3">
                                            <div className="w-7 h-7 rounded-full bg-primary/10 border border-primary/20 overflow-hidden flex items-center justify-center">
                                                {user.avatar_url ? (
                                                    <img src={user.avatar_url} className="w-full h-full object-cover" />
                                                ) : <Icon name="user" className="h-4 w-4 text-primary" />}
                                            </div>
                                            <span className="text-white font-black uppercase tracking-widest">{user.username || user.email}</span>
                                            {user.role === 'admin' ? (
                                                <span className="admin-glow px-3 py-1 rounded text-[8px] font-black tracking-[0.2em]">ADMIN</span>
                                            ) : user.role === 'friend' ? (
                                                <span className="friend-glow px-3 py-1 rounded text-[8px] font-black tracking-[0.2em]">FRIEND</span>
                                            ) : user.role === 'customer' ? (
                                                <span className="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded text-[8px] tracking-[0.1em] font-black uppercase">CUSTOMER</span>
                                            ) : (
                                                <span className="bg-blue-500/10 text-blue-400 border border-blue-500/20 px-3 py-1 rounded text-[8px] tracking-[0.1em] font-black uppercase">VERIFIED</span>
                                            )}
                                        </div>
                                    </div>
                                    <button onClick={logout} className="bg-white/5 border border-border px-3 py-1.5 rounded text-red-400 hover:bg-white/10 transition-all font-black uppercase tracking-widest">Sign Out</button>
                                </div>
                            ) : null}
                        </div>
                    </div>

                    {/* Nav */}
