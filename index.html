                                        <p className="text-[10px] font-black uppercase tracking-widest text-primary">Discord Role IDs (Automation)</p>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                            <div className="space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Day Role ID</label><input value={form.role_ids?.day || ''} onChange={e=>setForm({...form, role_ids:{...(form.role_ids||{}), day:e.target.value}})} className="w-full border-primary/20" placeholder="ID" /></div>
                                            <div className="space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Month Role ID</label><input value={form.role_ids?.month || ''} onChange={e=>setForm({...form, role_ids:{...(form.role_ids||{}), month:e.target.value}})} className="w-full border-primary/20" placeholder="ID" /></div>
                                            <div className="space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Lifetime Role ID</label><input value={form.role_ids?.lifetime || ''} onChange={e=>setForm({...form, role_ids:{...(form.role_ids||{}), lifetime:e.target.value}})} className="w-full border-primary/20" placeholder="ID" /></div>
                                        </div>
                                    </div>
                                    <div className="col-span-2"><CustomSelect label="Status" value={form.status} onChange={v => setForm({...form, status: v})} options={[{value:'undetected',label:'UNDETECTED'},{value:'updating',label:'UPDATING'},{value:'detected',label:'DETECTED'},{value:'testing',label:'TESTING'},{value:'at-risk',label:'USE AT YOUR OWN RISK'}]} /></div>
                                    
                                    <div className="p-6 bg-white/5 rounded-2xl border border-white/5 space-y-6">
                                        <p className="text-[10px] font-black uppercase tracking-widest text-primary">Pricing (EUR)</p>
                                        <div className="space-y-4">
                                            <div className="space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Day Price</label><input type="number" value={form.price || 0} onChange={e=>setForm({...form, price:parseFloat(e.target.value) || 0})} className="w-full" /></div>
                                            <div className="space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Month Price</label><input type="number" value={form.month_price || 0} onChange={e=>setForm({...form, month_price:parseFloat(e.target.value) || 0})} className="w-full" /></div>
                                            <div className="space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Lifetime Price</label><input type="number" value={form.lifetime_price || 0} onChange={e=>setForm({...form, lifetime_price:parseFloat(e.target.value) || 0})} className="w-full" /></div>
                                        </div>
                                    </div>

                                    <div className="p-6 bg-white/5 rounded-2xl border border-white/5 space-y-6">
                                        <p className="text-[10px] font-black uppercase tracking-widest text-emerald-400">Inventory Stock</p>
                                        <div className="space-y-4">
                                            <div className="space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Day Stock</label><input type="number" value={form.stock.day} onChange={e=>setForm({...form, stock:{...form.stock, day:parseInt(e.target.value)}})} className="w-full" /></div>
                                            <div className="space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Month Stock</label><input type="number" value={form.stock.month} onChange={e=>setForm({...form, stock:{...form.stock, month:parseInt(e.target.value)}})} className="w-full" /></div>
                                            <div className="space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Lifetime Stock</label><input type="number" value={form.stock.lifetime} onChange={e=>setForm({...form, stock:{...form.stock, lifetime:parseInt(e.target.value)}})} className="w-full" /></div>
                                        </div>
                                    </div>

                                    <div className="p-6 bg-white/5 rounded-2xl border border-white/5 space-y-6 md:col-span-2">
                                        <p className="text-[10px] font-black uppercase tracking-widest text-blue-400">Supported Systems</p>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Operating System</label><input value={form.requirements?.support} onChange={e=>setForm({...form, requirements:{...form.requirements, support:e.target.value}})} className="w-full" placeholder="e.g. Win 10/11" /></div>
                                            <div className="space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Processor</label><input value={form.requirements?.processor} onChange={e=>setForm({...form, requirements:{...form.requirements, processor:e.target.value}})} className="w-full" placeholder="e.g. Intel & AMD" /></div>
                                        </div>
                                    </div>

                                    <div className="col-span-2 space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Features (Lines)</label><textarea className="w-full h-40" value={form.featureText} onChange={e=>setForm({...form, featureText:e.target.value})}></textarea></div>
                                </div>
                                <button onClick={async ()=>{
                                    const { featureText, ...upsertData } = form;
                                    const { error } = await _supabase.from('products').upsert([{...upsertData, features:(featureText || '').split('\n').filter(f=>f.trim())}]);
                                    if (!error) {
                                        await refreshData();
                                        setEditing(null);
                                        notify("Inventory updated successfully.");
                                    } else {
                                        notify("Failed to save changes. Check console.", "error");
                                        console.error('Supabase Upsert Error:', error);
                                    }
                                }} className="w-full bg-primary py-5 rounded-[2rem] font-black mt-12 uppercase italic shadow-glow">Confirm Changes</button>
                            </div>
                        </div>
                    )}

                    {viewingUserOrders && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-background/95 backdrop-blur-sm" onClick={()=>setViewingUserOrders(null)}></div>
                            <div className="relative bg-card border border-border w-full max-w-2xl p-12 rounded-[3rem] shadow-2xl modal-animate flex flex-col max-h-[80vh]">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-black uppercase italic tracking-tighter">Orders for <span className="text-primary">{viewingUserOrders.username || viewingUserOrders.email}</span></h3>
                                    <button onClick={()=>setViewingUserOrders(null)} className="p-2 opacity-30 hover:opacity-100"><Icon name="x" /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto space-y-4 no-scrollbar">
                                    {orders.filter(o => o.user_email === viewingUserOrders.email).length === 0 ? (
                                        <p className="text-center py-12 opacity-30 font-black uppercase text-[10px] tracking-widest italic">No orders found.</p>
                                    ) : orders.filter(o => o.user_email === viewingUserOrders.email).map(o => (
                                        <div key={o.id} className="bg-white/5 border border-white/5 p-6 rounded-2xl flex justify-between items-center group/ord">
                                            <div><p className="font-black text-lg tracking-widest">{o.id}</p><p className="text-[8px] font-bold opacity-30 uppercase mt-1">{new Date(o.timestamp).toLocaleDateString()}</p></div>
                                            <div className="flex items-center gap-4">
                                                <span className={`px-4 py-1 rounded-full border text-[8px] font-black uppercase ${o.status === 'delivered' ? 'border-emerald-400 text-emerald-400' : 'border-amber-400 text-amber-400'}`}>{o.status}</span>
                                                <button onClick={() => setDeletingOrder(o)} className="p-2 bg-red-500/10 text-red-400 rounded-lg opacity-0 group-hover/ord:opacity-100 transition-all"><Icon name="trash-2" className="h-3 w-3" /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {deletingOrder && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-background/95 backdrop-blur-sm" onClick={()=>setDeletingOrder(null)}></div>
                            <div className="relative bg-card border border-red-500/20 w-full max-w-md p-12 rounded-[2.5rem] shadow-2xl modal-animate text-center">
                                <Icon name="alert-triangle" className="h-12 w-12 text-red-500 mx-auto mb-6" />
                                <h3 className="text-2xl font-black uppercase italic mb-4">Delete Order <span className="text-red-500">{deletingOrder.id}</span>?</h3>
                                <p className="text-xs text-white/40 mb-10 font-bold uppercase tracking-widest italic leading-relaxed">Deleting this order will refund stock to the inventory. This cannot be undone.</p>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={()=>setDeletingOrder(null)} className="bg-white/5 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest">Cancel</button>
                                    <button onClick={finalizeOrderDeletion} className="bg-red-500 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-glow">Delete Order</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {deletingProduct && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-background/95 backdrop-blur-sm" onClick={()=>setDeletingProduct(null)}></div>
                            <div className="relative bg-card border border-red-500/20 w-full max-w-md p-12 rounded-[2.5rem] shadow-2xl modal-animate text-center">
                                <Icon name="package-x" className="h-12 w-12 text-red-500 mx-auto mb-6" />
                                <h3 className="text-2xl font-black uppercase italic mb-4 text-red-500">Delete <span className="text-white">{deletingProduct.name}</span>?</h3>
                                <p className="text-xs text-white/40 mb-10 font-bold uppercase tracking-widest italic leading-relaxed">This will permanently remove the product and all associated stock settings. Existing orders will not be affected.</p>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={()=>setDeletingProduct(null)} className="bg-white/5 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest">Cancel</button>
                                    <button onClick={async () => { 
                                        const { error } = await _supabase.from('products').delete().eq('id', deletingProduct.id);
                                        if (!error) {
                                            setProducts(products.filter(p => p.id !== deletingProduct.id)); 
                                            setDeletingProduct(null); 
                                            notify("Product removed from inventory."); 
                                        }
                                    }} className="bg-red-500 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-glow">Delete Forever</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {promotingAdmin && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-background/95 backdrop-blur-sm" onClick={()=>setPromotingAdmin(null)}></div>
                            <div className="relative bg-card border border-primary/20 w-full max-w-md p-12 rounded-[2.5rem] shadow-2xl modal-animate text-center">
                                <Icon name="shield-alert" className="h-12 w-12 text-primary mx-auto mb-6" />
                                <h3 className="text-2xl font-black uppercase italic mb-4">Grant <span className="text-primary">Admin Access?</span></h3>
                                <p className="text-xs text-white/40 mb-10 font-bold uppercase tracking-widest italic leading-relaxed">Full control over users and inventory for {promotingAdmin.username || promotingAdmin.email}.</p>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={()=>setPromotingAdmin(null)} className="bg-white/5 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest">Cancel</button>
                                    <button onClick={finalizeAdminPromotion} className="bg-primary py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-glow">Promote</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {confirmingDiscordDisconnect && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-background/95 backdrop-blur-sm" onClick={()=>setConfirmingDiscordDisconnect(false)}></div>
                            <div className="relative bg-card border border-red-500/20 w-full max-w-md p-12 rounded-[2.5rem] shadow-2xl modal-animate text-center">
                                <Icon name="unlink" className="h-12 w-12 text-red-500 mx-auto mb-6" />
                                <h3 className="text-2xl font-black uppercase italic mb-4">Disconnect <span className="text-red-500">Discord</span>?</h3>
                                <p className="text-xs text-white/40 mb-10 font-bold uppercase tracking-widest italic leading-relaxed">Unlink your Discord identity and lose access to member channels.</p>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={()=>setConfirmingDiscordDisconnect(false)} className="bg-white/5 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest">Cancel</button>
                                    <button onClick={finalizeDiscordDisconnect} className="bg-red-500 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-glow">Disconnect</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {deletingUser && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-background/95 backdrop-blur-sm" onClick={()=>setDeletingUser(null)}></div>
                            <div className="relative bg-card border border-red-500/20 w-full max-w-lg p-12 rounded-[2.5rem] shadow-2xl modal-animate text-center">
                                <Icon name="alert-triangle" className="h-12 w-12 text-red-500 mx-auto mb-6" />
                                <h3 className="text-3xl font-black uppercase italic mb-4 text-red-500">Delete <span className="text-white">User?</span></h3>
                                <div className="space-y-4 text-left mb-10">
                                    <label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Confirm by typing the email: {deletingUser.email}</label>
                                    <input value={confirmEmail} onChange={e=>setConfirmEmail(e.target.value)} placeholder={deletingUser.email} className="w-full border-red-500/30 text-red-400" />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={()=>setDeletingUser(null)} className="bg-white/5 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest">Cancel</button>
                                    <button onClick={finalizeUserDeletion} className={`py-4 rounded-xl font-black uppercase text-[10px] tracking-widest ${confirmEmail === deletingUser.email ? 'bg-red-500 shadow-glow' : 'opacity-20 cursor-not-allowed bg-red-500'}`}>Delete Forever</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {editingUsername && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-background/95 backdrop-blur-sm" onClick={()=>setEditingUsername(null)}></div>
                            <div className="relative bg-card border border-primary/20 w-full max-w-lg p-12 rounded-[2.5rem] shadow-2xl modal-animate text-center">
                                <h3 className="text-3xl font-black uppercase italic mb-10">Edit <span className="text-primary">Username</span></h3>
                                <input id="newUsernameInput" defaultValue={editingUsername.username} placeholder="New Username" className="w-full mb-10" />
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={()=>setEditingUsername(null)} className="bg-white/5 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest">Cancel</button>
                                    <button onClick={() => finalizeUsernameChange(editingUsername.email, document.getElementById('newUsernameInput').value)} className="bg-primary py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-glow">Save</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {editingUserAccount && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-background/95 backdrop-blur-sm" onClick={()=>setEditingUserAccount(null)}></div>
                            <div className="relative bg-card border border-blue-500/20 w-full max-w-lg p-12 rounded-[2.5rem] shadow-2xl modal-animate text-center">
                                <h3 className="text-3xl font-black uppercase italic mb-10">Edit <span className="text-blue-400">Credentials</span></h3>
                                <div className="space-y-6 text-left mb-10"><input id="editUserEmail" defaultValue={editingUserAccount.email} className="w-full" placeholder="Email" /><input id="editUserPass" defaultValue={editingUserAccount.pass} className="w-full" placeholder="Password" /></div>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={()=>setEditingUserAccount(null)} className="bg-white/5 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest">Cancel</button>
                                    <button onClick={() => finalizeUserAccountChange(editingUserAccount.email, {email: document.getElementById('editUserEmail').value, pass: document.getElementById('editUserPass').value})} className="bg-blue-500 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-glow">Save</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {closingTicket && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-background/95 backdrop-blur-sm" onClick={()=>setClosingTicket(null)}></div>
                            <div className="relative bg-card border border-red-500/20 w-full max-w-lg p-12 rounded-[2.5rem] shadow-2xl modal-animate text-center">
                                <div className="h-16 w-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-8 border border-red-500/20"><Icon name="alert-triangle" className="h-8 w-8 text-red-400" /></div>
                                <h3 className="text-3xl font-black uppercase italic mb-4">Close <span className="text-red-400">Ticket?</span></h3>
                                <p className="text-sm text-white/40 font-bold mb-10">Are you sure you want to close ticket <span className="text-white font-black">{closingTicket.id}</span>? The user will be notified and the conversation will be saved.</p>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={()=>setClosingTicket(null)} className="bg-white/5 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest">Cancel</button>
                                    <button onClick={() => closeTicket(closingTicket.id)} className="bg-red-500 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-glow">Close Ticket</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {deletingTicket && (
                        <div className="fixed inset-0 z-[400] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-background/95 backdrop-blur-sm" onClick={()=>setDeletingTicket(null)}></div>
                            <div className="relative bg-card border border-red-500/20 w-full max-w-lg p-12 rounded-[2.5rem] shadow-2xl modal-animate text-center">
                                <div className="h-16 w-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-8 border border-red-500/20"><Icon name="trash-2" className="h-8 w-8 text-red-400" /></div>
                                <h3 className="text-3xl font-black uppercase italic mb-4 text-red-500">Delete <span className="text-white">Ticket?</span></h3>
                                <div className="space-y-4 text-left mb-10">
                                    <label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Confirm by typing the subject: {deletingTicket.subject}</label>
                                    <input value={confirmTicketSubject} onChange={e=>setConfirmTicketSubject(e.target.value)} placeholder={deletingTicket.subject} className="w-full border-red-500/30 text-red-400" />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={()=>setDeletingTicket(null)} className="bg-white/5 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest">Cancel</button>
                                    <button 
                                        disabled={confirmTicketSubject !== deletingTicket.subject}
                                        onClick={() => deleteTicket(deletingTicket.id)} 
                                        className={`py-4 rounded-xl font-black uppercase text-[10px] tracking-widest transition-all ${confirmTicketSubject === deletingTicket.subject ? 'bg-red-500 shadow-glow opacity-100' : 'bg-red-500 opacity-20 cursor-not-allowed'}`}
                                    >
                                        Delete Forever
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="py-24 text-center opacity-10 font-black italic uppercase tracking-[1em] text-sm">SZH Services — Dominate Any Game</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
