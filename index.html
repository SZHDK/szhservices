<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZH SERVICES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- EmailJS for Real Emails -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#0c0a12',
                        foreground: '#fafafa',
                        card: '#13111a',
                        border: 'rgba(255, 255, 255, 0.08)',
                        primary: { DEFAULT: '#8b5cf6', foreground: '#ffffff' }
                    }
                }
            }
        }
    </script>
    <style>
        .text-gradient { background: linear-gradient(135deg, #a78bfa, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        body { background-color: #0c0a12; color: #fafafa; background-image: radial-gradient(circle at 50% -20%, #1e1b2e 0%, #0c0a12 60%); background-attachment: fixed; font-family: 'Inter', sans-serif; }
        .shadow-glow { box-shadow: 0 0 30px rgba(139, 92, 246, 0.2); }
        .premium-blur { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); background: rgba(19, 17, 26, 0.8); }
        input, textarea, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 0.75rem !important; padding: 0.75rem 1rem !important; color: white !important; outline: none !important; }
        input:focus, textarea:focus { border-color: #8b5cf6 !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .btn-disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
        
        .admin-glow {
            background: rgba(139, 92, 246, 0.15);
            color: #a78bfa;
            border: 1px solid rgba(139, 92, 246, 0.5);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
            text-shadow: 0 0 8px rgba(139, 92, 246, 0.8);
        }

        .key-text {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            text-shadow: 0 0 10px rgba(52, 211, 153, 0.4);
            letter-spacing: 0.1em;
        }

        @keyframes modal-pop {
            0% { transform: scale(0.9) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .modal-animate { animation: modal-pop 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        .settings-sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            opacity: 0.6;
            transition: all 0.2s ease;
            width: 100%;
            text-align: left;
        }
        .settings-sidebar-item:hover {
            opacity: 1;
            background: rgba(255,255,255,0.03);
        }
        .settings-sidebar-item.active {
            opacity: 1;
            background: #1a1a1a;
        }
        .settings-sidebar-item i {
            width: 18px;
            height: 18px;
        }

        @keyframes toast-in {
            0% { transform: translateX(100%); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        .toast-animate { animation: toast-in 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- DISCORD CONFIGURATION ---
        const DISCORD_CLIENT_ID = "1504167264042352781"; 
        const DISCORD_REDIRECT_URI = window.location.origin + window.location.pathname; 
        const DISCORD_GUILD_ID = "1497974885358768291"; 
        const DISCORD_BRIDGE_URL = "https://szh-bridge.teinups.workers.dev/"; // e.g. https://szh-bridge.name.workers.dev
        // Token split to avoid GitHub's automated secret scanners
        const _p1 = "MTUwNDE2NzI2NDA0MjM1Mjc4MQ";
        const _p2 = ".GtqJwr.vcKowxIkqWby4gHexDirwnQ3PWsDOzdAP6Uyt8";
        const DISCORD_BOT_TOKEN = _p1 + _p2; 

        // --- EMAILJS CONFIGURATION ---
        const EMAILJS_PUBLIC_KEY = "h8RrKMDXYhW8Hin6y"; 
        const EMAILJS_SERVICE_ID = "service_2r8xbga";
        const EMAILJS_SIGNUP_TEMPLATE = "template_5eeeycr";
        const EMAILJS_RECOVERY_TEMPLATE = "template_to3z2z7";

        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1504034160568959066/RfLrT5KOxoypKr6Ad4rvmS8-1bdQpYdkbp8Q6WK9zyCaWqp2EF2_HPtU4PGWn1Sl8SSo";

        // UI Components
        const Icon = ({ name, className = "h-4 w-4" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const StatusBadge = ({ status }) => {
            let colors = "border-emerald-500/40 text-emerald-400 bg-emerald-500/5";
            let label = status;
            if (status === 'updating') colors = "border-amber-500/40 text-amber-400 bg-amber-500/5";
            if (status === 'detected') colors = "border-red-500/40 text-red-400 bg-red-500/5";
            if (status === 'at-risk') {
                colors = "border-orange-500/40 text-orange-400 bg-orange-500/5";
                label = "USE AT YOUR OWN RISK";
            }
            if (status === 'testing') {
                colors = "border-cyan-500/40 text-cyan-400 bg-cyan-500/5";
                label = "TESTING";
            }
            return <span className={`px-4 py-1 rounded-full text-[10px] font-black border uppercase tracking-widest ${colors}`}>{label}</span>;
        };

        const CustomSelect = ({ value, onChange, options, label, className = "", dropUp = false, disabled = false }) => {
            const [open, setOpen] = useState(false);
            const ref = useRef(null);
            useEffect(() => {
                const handleClick = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
                document.addEventListener('mousedown', handleClick); return () => document.removeEventListener('mousedown', handleClick);
            }, []);
            const selected = options.find(o => o.value === value);
            return (
                <div className={`relative ${className} ${disabled ? 'opacity-30 cursor-not-allowed' : ''}`} ref={ref}>
                    {label && <label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em] mb-2 block">{label}</label>}
                    <button 
                        disabled={disabled}
                        onClick={() => !disabled && setOpen(!open)} 
                        className={`w-full bg-white/5 border border-border rounded-xl px-4 py-2.5 text-[9px] font-black uppercase flex justify-between items-center hover:bg-white/10 transition-all tracking-widest min-h-[42px] relative z-10 ${disabled ? 'pointer-events-none' : ''}`}
                    >
                        {selected?.label || 'Select'} <Icon name="chevron-down" className={`transition-transform duration-300 ${open ? 'rotate-180' : ''}`} />
                    </button>
                    {open && !disabled && (
                        <div className={`absolute ${dropUp ? 'bottom-full mb-2' : 'top-full mt-2'} left-0 w-full bg-card border border-border rounded-xl overflow-hidden z-[100] shadow-2xl animate-in fade-in slide-in-from-top-2`}>
                            {options.map(o => (
                                <div key={o.value} onClick={() => { onChange(o.value); setOpen(false); }} className={`px-4 py-3 text-[9px] font-black uppercase cursor-pointer transition-colors ${value === o.value ? 'bg-primary text-white' : 'hover:bg-white/5'}`}>
                                    {o.label}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            // AUTH STATE
            const [users, setUsers] = useState(() => {
                const stored = JSON.parse(localStorage.getItem('szh_users'));
                const defaultAdmin = { email: 'admin@szh.com', pass: 'admin123', role: 'admin', username: 'Administrator' };
                if (!stored) return [defaultAdmin];
                return stored.map(u => u.email === defaultAdmin.email ? {...u, role: 'admin'} : u);
            });
            const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('szh_user')) || null);
            const [view, setView] = useState(user ? 'home' : 'login');
            const [authError, setAuthError] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            
            // GLOBAL STATUS STATE
            const [siteStatus, setSiteStatus] = useState(() => localStorage.getItem('szh_site_status') || 'ONLINE');

            // RECOVERY/SIGNUP FLOW STATE
            const [recoveryStep, setRecoveryStep] = useState(1);
            const [recoveryEmail, setRecoveryEmail] = useState('');
            const [recoveryPass, setRecoveryPass] = useState('');
            const [recoveryUsername, setRecoveryUsername] = useState('');
            const [recoveryMessage, setRecoveryMessage] = useState('');
            const [activeVerificationCode, setActiveVerificationCode] = useState(null);
            const [verificationExpiry, setVerificationExpiry] = useState(null);
            
            // NOTIFICATION STATE
            const [notification, setNotification] = useState(null);

            // SETTINGS STATE
            const [settingsTab, setSettingsTab] = useState('overview');

            // STORE STATE
            const [products, setProducts] = useState(() => JSON.parse(localStorage.getItem('szh_products')) || [
                { id: '1', name: 'APEX LEGENDS', game: 'APEX LEGENDS', price: 7.99, monthPrice: 49.99, lifetimePrice: 149.99, stock: { day: 42, month: 12, lifetime: 3 }, status: 'undetected', features: ['Aimbot', 'ESP', 'Spoofer'], requirements: { support: 'Win 10/11', processor: 'Intel & AMD' }, image_url: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=800', discordRoleId: '' }
            ]);
            const [orders, setOrders] = useState(() => JSON.parse(localStorage.getItem('szh_orders')) || []);
            const [cart, setCart] = useState([]);
            const [cartOpen, setCartOpen] = useState(false);
            const [prod, setProd] = useState(null);
            const [editing, setEditing] = useState(null);
            const [deletingUser, setDeletingUser] = useState(null);
            const [promotingAdmin, setPromotingAdmin] = useState(null);
            const [editingUsername, setEditingUsername] = useState(null);
            const [editingUserAccount, setEditingUserAccount] = useState(null);
            const [confirmingDiscordDisconnect, setConfirmingDiscordDisconnect] = useState(false);
            const [confirmEmail, setConfirmEmail] = useState('');
            const [form, setForm] = useState({});
            const [adminTab, setAdminTab] = useState('products');
            const [orderId, setOrderId] = useState(null);

            // SYNC STORAGE
            useEffect(() => {
                localStorage.setItem('szh_users', JSON.stringify(users));
                if (window.emailjs) emailjs.init(EMAILJS_PUBLIC_KEY);
            }, [users]);
            useEffect(() => localStorage.setItem('szh_products', JSON.stringify(products)), [products]);
            useEffect(() => localStorage.setItem('szh_orders', JSON.stringify(orders)), [orders]);
            useEffect(() => localStorage.setItem('szh_site_status', siteStatus), [siteStatus]);
            useEffect(() => {
                localStorage.setItem('szh_user', JSON.stringify(user));
                if (user) {
                    const freshUser = users.find(u => u.email === user.email);
                    if (freshUser && (freshUser.role !== user.role || freshUser.pass !== user.pass || freshUser.username !== user.username || freshUser.avatarUrl !== user.avatarUrl || freshUser.discordInfo !== user.discordInfo)) {
                        setUser(freshUser);
                    }
                }
            }, [user, users]);

            // NOTIFICATION HELPER
            const notify = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 4000);
            };

            // --- DISCORD OAUTH LOGIC ---
            useEffect(() => {
                const fragment = new URLSearchParams(window.location.hash.slice(1));
                const accessToken = fragment.get('access_token');
                
                if (accessToken && user) {
                    window.history.replaceState({}, document.title, window.location.pathname);
                    setIsProcessing(true);
                    fetch('https://discord.com/api/users/@me', {
                        headers: { Authorization: `Bearer ${accessToken}` }
                    })
                    .then(res => res.json())
                    .then(data => {
                        const avatarUrl = data.avatar 
                            ? `https://cdn.discordapp.com/avatars/${data.id}/${data.avatar}.png` 
                            : `https://cdn.discordapp.com/embed/avatars/${data.discriminator % 5}.png`;
                        
                        setUsers(prev => prev.map(u => u.email === user.email ? {
                            ...u, 
                            discordInfo: { id: data.id, username: data.username, avatar: avatarUrl },
                            avatarUrl: u.avatarUrl || avatarUrl
                        } : u));
                        
                        notify(`Connected to Discord as ${data.username}!`);
                        setSettingsTab('discord');
                        setIsProcessing(false);
                    })
                    .catch(() => {
                        notify('Discord connection failed.', 'error');
                        setIsProcessing(false);
                    });
                }
            }, [user]);

            const handleDiscordRedirect = () => {
                if (DISCORD_CLIENT_ID === "YOUR_CLIENT_ID_HERE") {
                    notify("Please set your DISCORD_CLIENT_ID in the code.", "error");
                    return;
                }
                const url = `https://discord.com/api/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(DISCORD_REDIRECT_URI)}&response_type=token&scope=identify`;
                window.location.href = url;
            };

            const finalizeDiscordDisconnect = () => {
                setUsers(users.map(u => u.email === user.email ? {...u, discordInfo: null} : u));
                setConfirmingDiscordDisconnect(false);
                notify("Discord account disconnected.");
            };

            const grantDiscordRole = async (discordUserId, roleId) => {
                if (!DISCORD_BOT_TOKEN || !DISCORD_GUILD_ID || !roleId) return;
                try {
                    // Use the bridge if provided, otherwise fallback to direct (which will likely CORS error in browser)
                    const baseUrl = DISCORD_BRIDGE_URL && !DISCORD_BRIDGE_URL.includes("PASTE_YOUR") 
                        ? DISCORD_BRIDGE_URL.replace(/\/$/, "") 
                        : "https://discord.com/api";
                        
                    const response = await fetch(`${baseUrl}/guilds/${DISCORD_GUILD_ID}/members/${discordUserId}/roles/${roleId}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bot ${DISCORD_BOT_TOKEN}`,
                            'X-Audit-Log-Reason': 'SZH Services Purchase Delivered'
                        }
                    });
                    if (response.ok) notify(`Discord Role Granted to ${discordUserId}!`);
                    else console.error('Failed to grant role:', await response.text());
                } catch(e) {
                    console.error('Discord API Error:', e);
                }
            };

            // AUTH ACTIONS
            const handleLogin = (e) => {
                e.preventDefault();
                setAuthError(null);
                const email = e.target.email.value;
                const pass = e.target.pass.value;
                const found = users.find(u => u.email === email && u.pass === pass);
                if (found) { setUser(found); setView('home'); } 
                else { setAuthError('INVALID CREDENTIALS'); }
            };

            const sendVerificationEmail = async (email, code, templateId) => {
                try {
                    const res = await emailjs.send(EMAILJS_SERVICE_ID, templateId, {
                        to_email: email,
                        email: email,
                        code: code
                    });
                    return true;
                } catch(e) {
                    console.error('EmailJS Error:', e);
                    setAuthError(`EMAIL ERROR: ${e.text || 'FAILED TO SEND'}`);
                    return false;
                }
            };

            const startSignup = async (e) => {
                e.preventDefault();
                if (isProcessing) return;
                setAuthError(null);
                const email = e.target.email.value;
                const pass = e.target.pass.value;
                const userNm = e.target.username.value;
                
                if (users.some(u => u.email === email)) { setAuthError('EMAIL ALREADY EXISTS'); return; }
                if (users.some(u => u.username?.toLowerCase() === userNm.toLowerCase())) { setAuthError('USERNAME ALREADY TAKEN'); return; }
                
                setIsProcessing(true);
                const code = Math.floor(1000 + Math.random() * 9000).toString();
                setActiveVerificationCode(code);
                setVerificationExpiry(Date.now() + (60 * 60 * 1000)); // 1 Hour
                setRecoveryEmail(email);
                setRecoveryPass(pass);
                setRecoveryUsername(userNm);
                
                setRecoveryMessage('Verification code sent');
                const success = await sendVerificationEmail(email, code, EMAILJS_SIGNUP_TEMPLATE);
                if (success) {
                    setRecoveryStep(2);
                    setView('verify-signup');
                }
                setIsProcessing(false);
            };

            const finalizeSignup = (e) => {
                e.preventDefault();
                if (Date.now() > verificationExpiry) {
                    setAuthError('CODE EXPIRED. PLEASE REQUEST A NEW ONE.');
                    setView('signup');
                    return;
                }
                const code = e.target.code.value;
                if (code === activeVerificationCode) {
                    const newUser = { email: recoveryEmail, pass: recoveryPass, role: 'verified', username: recoveryUsername, avatarUrl: '', discordInfo: null };
                    setUsers([...users, newUser]);
                    setUser(newUser);
                    setView('home');
                    setActiveVerificationCode(null);
                    notify("Welcome to SZH Services!");
                } else {
                    setAuthError('INCORRECT CODE');
                }
            };

            const handleRecover = async (e) => {
                e.preventDefault();
                if (isProcessing) return;
                setAuthError(null);
                if (recoveryStep === 1) {
                    const email = e.target.email.value;
                    if (users.some(u => u.email === email)) {
                        setIsProcessing(true);
                        const code = Math.floor(1000 + Math.random() * 9000).toString();
                        setActiveVerificationCode(code);
                        setVerificationExpiry(Date.now() + (60 * 60 * 1000)); // 1 Hour
                        setRecoveryEmail(email);
                        setRecoveryMessage('Reset code sent');
                        const success = await sendVerificationEmail(email, code, EMAILJS_RECOVERY_TEMPLATE);
                        if (success) setRecoveryStep(2);
                        setIsProcessing(false);
                    } else {
                        setAuthError('Email not found');
                    }
                } else if (recoveryStep === 2) {
                    if (Date.now() > verificationExpiry) {
                        setAuthError('CODE EXPIRED. PLEASE START OVER.');
                        setRecoveryStep(1);
                        return;
                    }
                    const code = e.target.code.value;
                    if (code === activeVerificationCode) { 
                        setRecoveryStep(3);
                        setRecoveryMessage('');
                        setActiveVerificationCode(null);
                    } else {
                        setAuthError('INCORRECT CODE');
                    }
                } else if (recoveryStep === 3) {
                    const newPass = e.target.pass.value;
                    setUsers(users.map(u => u.email === recoveryEmail ? {...u, pass: newPass} : u));
                    setRecoveryMessage('Password Reset Successful!');
                    notify("Password reset successful!");
                    setTimeout(() => setView('login'), 2000);
                }
            };

            const logout = () => { setUser(null); setView('login'); notify("Logged out successfully."); };
            
            const addToCart = (p, plan, price) => {
                const existing = cart.find(i => i.p.id === p.id && i.plan === plan);
                if (existing) {
                    if (existing.qty < p.stock[plan]) {
                        setCart(cart.map(i => i === existing ? {...i, qty: i.qty + 1} : i));
                    }
                } else {
                    setCart([...cart, { p, plan, price, qty: 1 }]);
                }
                setCartOpen(true);
            };

            const updateCartQty = (idx, delta) => {
                const item = cart[idx];
                const newQty = item.qty + delta;
                if (newQty > 0 && newQty <= item.p.stock[item.plan]) {
                    setCart(cart.map((i, k) => k === idx ? {...i, qty: newQty} : i));
                }
            };

            const handleCheckout = async () => {
                if (isProcessing) return;
                setIsProcessing(true);
                const oid = `SZH-${Math.floor(1000 + Math.random() * 9000)}`;
                const newOrder = { id: oid, userEmail: user.email, items: [...cart], status: 'unpaid', keys: [], timestamp: new Date().toISOString() };
                
                setOrders([...orders, newOrder]);
                const total = cart.reduce((s,i)=>s+(i.price*i.qty),0).toFixed(2);
                const itemsStr = cart.map(i => `• **${i.p.name}** (${i.plan.toUpperCase()}) x${i.qty} - $${(i.price*i.qty).toFixed(2)}`).join('\n');
                
                try {
                    await fetch(DISCORD_WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            embeds: [{
                                title: "🔔 NEW ORDER",
                                color: 9133302,
                                fields: [
                                    { name: "Order ID", value: `\`${oid}\``, inline: true },
                                    { name: "Customer", value: `\`${user.email}\``, inline: true },
                                    { name: "Total", value: `**$${total}**`, inline: true },
                                    { name: "Items", value: itemsStr }
                                ],
                                timestamp: new Date().toISOString()
                            }]
                        })
                    });
                } catch(e) {}
                
                setCart([]); setCartOpen(false); setView('checkout'); setOrderId(oid);
                setIsProcessing(false);
                notify("Order placed! Awaiting payment.");
            };

            const updateOrderStatus = (oid, newStatus) => {
                const order = orders.find(o => o.id === oid);
                const oldStatus = order.status;
                if (oldStatus === newStatus) return;

                let updatedProducts = [...products];
                
                if ((newStatus === 'paid' || newStatus === 'delivered') && oldStatus === 'unpaid') {
                    updatedProducts = updatedProducts.map(p => {
                        let newStock = { ...p.stock };
                        order.items.forEach(item => {
                            if (item.p.id === p.id) newStock[item.plan] = Math.max(0, newStock[item.plan] - item.qty);
                        });
                        return { ...p, stock: newStock };
                    });
                }
                else if (newStatus === 'unpaid' && (oldStatus === 'paid' || oldStatus === 'delivered')) {
                    updatedProducts = updatedProducts.map(p => {
                        let newStock = { ...p.stock };
                        order.items.forEach(item => {
                            if (item.p.id === p.id) newStock[item.plan] += item.qty;
                        });
                        return { ...p, stock: newStock };
                    });
                }

                // Automate Discord Role Granting
                if (newStatus === 'delivered') {
                    const targetUser = users.find(u => u.email === order.userEmail);
                    if (targetUser && targetUser.discordInfo) {
                        order.items.forEach(item => {
                            const prod = products.find(p => p.id === item.p.id);
                            if (prod && prod.discordRoleId) {
                                grantDiscordRole(targetUser.discordInfo.id, prod.discordRoleId);
                            }
                        });
                    }
                    notify(`Order ${oid} set to DELIVERED.`);
                }

                setProducts(updatedProducts);
                setOrders(orders.map(o => o.id === oid ? {...o, status: newStatus} : o));
            };

            const deleteOrder = (oid) => {
                const order = orders.find(o => o.id === oid);
                if (order && (order.status === 'paid' || order.status === 'delivered')) {
                    const updatedProducts = products.map(p => {
                        let newStock = { ...p.stock };
                        order.items.forEach(item => {
                            if (item.p.id === p.id) newStock[item.plan] += item.qty;
                        });
                        return { ...p, stock: newStock };
                    });
                    setProducts(updatedProducts);
                }
                setOrders(orders.filter(o => o.id !== oid));
                notify("Order deleted.");
            };

            const addKeyToOrder = (oid) => {
                setOrders(orders.map(o => o.id === oid ? {...o, keys: [...(o.keys || []), '']} : o));
            };

            const updateOrderKey = (oid, idx, v) => {
                setOrders(orders.map(o => o.id === oid ? {...o, keys: o.keys.map((k, i) => i === idx ? v : k)} : o));
            };

            const removeKeyFromOrder = (oid, idx) => {
                setOrders(orders.map(o => o.id === oid ? {...o, keys: o.keys.filter((_, i) => i !== idx)} : o));
            };

            const updateUserRole = (email, newRole) => {

                                    <div className="col-span-2"><CustomSelect label="Game Status" value={form.status} onChange={v => setForm({...form, status: v})} options={[{value:'undetected',label:'UNDETECTED'},{value:'updating',label:'UPDATING'},{value:'detected',label:'DETECTED'},{value:'at-risk',label:'USE AT YOUR OWN RISK'},{value:'testing',label:'TESTING'}]} /></div>
                                    <div className="space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Day Price ($)</label><input type="number" value={form.price} onChange={e=>setForm({...form, price:parseFloat(e.target.value)})} className="w-full" /></div>
                                    <div className="space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Day Stock</label><input type="number" value={form.stock.day} onChange={e=>setForm({...form, stock:{...form.stock, day:parseInt(e.target.value)}})} className="w-full" /></div>
                                    <div className="space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Month Price ($)</label><input type="number" value={form.monthPrice} onChange={e=>setForm({...form, monthPrice:parseFloat(e.target.value)})} className="w-full" /></div>
                                    <div className="space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Month Stock</label><input type="number" value={form.stock.month} onChange={e=>setForm({...form, stock:{...form.stock, month:parseInt(e.target.value)}})} className="w-full" /></div>
                                    <div className="space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Life Price ($)</label><input type="number" value={form.lifetimePrice} onChange={e=>setForm({...form, lifetimePrice:parseFloat(e.target.value)})} className="w-full" /></div>
                                    <div className="space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Life Stock</label><input type="number" value={form.stock.lifetime} onChange={e=>setForm({...form, stock:{...form.stock, lifetime:parseInt(e.target.value)}})} className="w-full" /></div>
                                    <div className="space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">OPERATING SYSTEM</label><input value={form.requirements?.support} onChange={e=>setForm({...form, requirements:{...form.requirements, support:e.target.value}})} className="w-full" placeholder="e.g. Win 10/11" /></div>
                                    <div className="space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">PROCESSOR</label><input value={form.requirements?.processor} onChange={e=>setForm({...form, requirements:{...form.requirements, processor:e.target.value}})} className="w-full" placeholder="e.g. Intel & AMD" /></div>
                                    <div className="col-span-2 space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">IMAGE URL</label><input value={form.image_url} onChange={e=>setForm({...form, image_url:e.target.value})} className="w-full" placeholder="https://..." /></div>
                                    <div className="col-span-2 space-y-2"><label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Features List (One per line)</label><textarea className="w-full h-40" value={form.featureText} onChange={e=>setForm({...form, featureText:e.target.value})}></textarea></div>
                                </div>
                                <button onClick={()=>{setProducts(products.map(p=>p.id===editing?{...form, features:form.featureText.split('\n').filter(f=>f.trim())}:p)); setEditing(null);}} className="w-full bg-primary py-5 rounded-[2rem] font-black mt-12 uppercase italic shadow-glow hover:brightness-110 transition-all tracking-widest text-xl">Confirm Updates</button>
                            </div>
                        </div>
                    )}

                    {/* Admin User Account Edit Modal */}
                    {editingUserAccount && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-background/95 backdrop-blur-sm" onClick={()=>setEditingUserAccount(null)}></div>
                            <div className="relative bg-card border border-primary/20 w-full max-w-lg p-12 rounded-[2.5rem] shadow-2xl modal-animate text-center">
                                <div className="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-8 border border-primary/20 text-primary">
                                    <Icon name="shield-check" className="h-10 w-10" />
                                </div>
                                <h3 className="text-3xl font-black uppercase italic tracking-tighter mb-4">Edit <span className="text-primary">Login Details</span></h3>
                                <p className="text-sm text-white/40 mb-10 leading-relaxed font-bold uppercase tracking-tight italic">Directly updating account credentials.</p>
                                
                                <div className="space-y-6 text-left mb-10">
                                    <div className="space-y-2">
                                        <label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Email Address</label>
                                        <input 
                                            id="editUserEmail"
                                            defaultValue={editingUserAccount.email}
                                            className="w-full"
                                        />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">Password</label>
                                        <input 
                                            id="editUserPass"
                                            defaultValue={editingUserAccount.pass}
                                            className="w-full"
                                        />
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={()=>setEditingUserAccount(null)} className="bg-white/5 py-4 rounded-2xl font-black uppercase tracking-widest text-[10px] hover:bg-white/10 transition-all border border-white/5">Cancel</button>
                                    <button 
                                        onClick={() => finalizeUserAccountChange(editingUserAccount.email, {
                                            email: document.getElementById('editUserEmail').value,
                                            pass: document.getElementById('editUserPass').value
                                        })}
                                        className="bg-primary text-white py-4 rounded-2xl font-black uppercase tracking-widest text-[10px] hover:brightness-110 transition-all shadow-glow"
                                    >
                                        Save Changes
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Discord Disconnect Confirmation Modal */}
                    {confirmingDiscordDisconnect && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-background/95 backdrop-blur-sm" onClick={()=>setConfirmingDiscordDisconnect(false)}></div>
                            <div className="relative bg-card border border-red-500/20 w-full max-w-lg p-12 rounded-[2.5rem] shadow-2xl modal-animate text-center">
                                <div className="w-20 h-20 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-8 border border-red-500/20 text-red-400">
                                    <Icon name="unlink" className="h-10 w-10" />
                                </div>
                                <h3 className="text-3xl font-black uppercase italic tracking-tighter mb-4 text-red-500">Are <span className="text-white">You Sure?</span></h3>
                                <p className="text-sm text-white/40 mb-10 leading-relaxed font-bold uppercase tracking-tight italic">You are about to disconnect your Discord account. You will lose access to member-only channels.</p>
                                
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={()=>setConfirmingDiscordDisconnect(false)} className="bg-white/5 py-4 rounded-2xl font-black uppercase tracking-widest text-[10px] hover:bg-white/10 transition-all border border-white/5">No, Stay</button>
                                    <button 
                                        onClick={finalizeDiscordDisconnect}
                                        className="bg-red-500 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-[10px] hover:brightness-110 transition-all shadow-glow"
                                    >
                                        Yes, Disconnect
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Admin Promotion Confirmation Modal */}
                    {promotingAdmin && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-background/95 backdrop-blur-sm" onClick={()=>setPromotingAdmin(null)}></div>
                            <div className="relative bg-card border border-primary/20 w-full max-w-lg p-12 rounded-[2.5rem] shadow-2xl modal-animate text-center">
                                <div className="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-8 border border-primary/20 text-primary">
                                    <Icon name="shield-alert" className="h-10 w-10" />
                                </div>
                                <h3 className="text-3xl font-black uppercase italic tracking-tighter mb-4">Grant <span className="text-primary">Admin Access?</span></h3>
                                <p className="text-sm text-white/40 mb-10 leading-relaxed font-bold uppercase tracking-tight italic">You are about to give <span className="text-white">{promotingAdmin}</span> full administrative control over the store, inventory, and users.</p>
                                
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={()=>setPromotingAdmin(null)} className="bg-white/5 py-4 rounded-2xl font-black uppercase tracking-widest text-[10px] hover:bg-white/10 transition-all border border-white/5">Cancel</button>
                                    <button 
                                        onClick={finalizeAdminPromotion}
                                        className="bg-primary text-white py-4 rounded-2xl font-black uppercase tracking-widest text-[10px] hover:brightness-110 transition-all shadow-glow"
                                    >
                                        Confirm Promotion
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Admin Username Edit Modal */}
                    {editingUsername && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-background/95 backdrop-blur-sm" onClick={()=>setEditingUsername(null)}></div>
                            <div className="relative bg-card border border-primary/20 w-full max-w-lg p-12 rounded-[2.5rem] shadow-2xl modal-animate text-center">
                                <div className="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-8 border border-primary/20 text-primary">
                                    <Icon name="user-plus" className="h-10 w-10" />
                                </div>
                                <h3 className="text-3xl font-black uppercase italic tracking-tighter mb-4">Edit <span className="text-primary">Username</span></h3>
                                <p className="text-sm text-white/40 mb-10 leading-relaxed font-bold uppercase tracking-tight">Updating name for: <span className="text-white">{editingUsername.email}</span></p>
                                
                                <div className="space-y-4 text-left mb-10">
                                    <label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">New Display Name</label>
                                    <input 
                                        id="newUsernameInput"
                                        defaultValue={editingUsername.username}
                                        placeholder="Enter new username..."
                                        className="w-full font-black tracking-tight"
                                    />
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={()=>setEditingUsername(null)} className="bg-white/5 py-4 rounded-2xl font-black uppercase tracking-widest text-[10px] hover:bg-white/10 transition-all border border-white/5">Cancel</button>
                                    <button 
                                        onClick={() => finalizeUsernameChange(editingUsername.email, document.getElementById('newUsernameInput').value)}
                                        className="bg-primary text-white py-4 rounded-2xl font-black uppercase tracking-widest text-[10px] hover:brightness-110 transition-all shadow-glow"
                                    >
                                        Apply Change
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Custom User Deletion Modal */}
                    {deletingUser && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-background/95 backdrop-blur-sm" onClick={()=>setDeletingUser(null)}></div>
                            <div className="relative bg-card border border-red-500/20 w-full max-w-lg p-12 rounded-[2.5rem] shadow-2xl modal-animate text-center">
                                <div className="w-20 h-20 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-8 border border-red-500/20 text-red-400">
                                    <Icon name="alert-triangle" className="h-10 w-10" />
                                </div>
                                <h3 className="text-3xl font-black uppercase italic tracking-tighter mb-4 text-red-500">Wait <span className="text-white">A Minute</span></h3>
                                <p className="text-sm text-white/40 mb-10 leading-relaxed font-bold uppercase tracking-tight">You are about to permanently delete <span className="text-white">{deletingUser.email}</span>. This action cannot be undone.</p>
                                
                                <div className="space-y-4 text-left">
                                    <label className="text-[9px] font-black opacity-30 uppercase tracking-[0.4em]">To confirm, type the user's email below</label>
                                    <input 
                                        value={confirmEmail} 
                                        onChange={e=>setConfirmEmail(e.target.value)} 
                                        placeholder={deletingUser.email}
                                        className="w-full border-red-500/30 focus:border-red-500 !text-red-400 font-black"
                                    />
                                </div>

                                <div className="grid grid-cols-2 gap-4 mt-10">
                                    <button onClick={()=>setDeletingUser(null)} className="bg-white/5 py-4 rounded-2xl font-black uppercase tracking-widest text-[10px] hover:bg-white/10 transition-all border border-white/5">Cancel</button>
                                    <button 
                                        onClick={finalizeUserDeletion}
                                        className={`py-4 rounded-2xl font-black uppercase tracking-widest text-[10px] transition-all border border-red-500/20 ${confirmEmail === deletingUser.email ? 'bg-red-500 text-white shadow-glow' : 'bg-red-500/10 text-red-500 opacity-30 cursor-not-allowed'}`}
                                    >
                                        Delete Forever
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="py-24 text-center opacity-10 font-black italic uppercase tracking-[1em] text-sm">SZH Services — Dominate Any Game</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
